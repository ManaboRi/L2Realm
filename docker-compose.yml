services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: l2realm
      POSTGRES_USER: l2realm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - l2realm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U l2realm"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://l2realm:${POSTGRES_PASSWORD}@postgres:5432/l2realm
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 4000
      NODE_ENV: production
      VK_CLIENT_ID: ${VK_CLIENT_ID}
      VK_CLIENT_SECRET: ${VK_CLIENT_SECRET}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHANNEL_ID: ${TELEGRAM_CHANNEL_ID}
      CRON_SECRET: ${CRON_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - l2realm-net

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_VK_CLIENT_ID: ${VK_CLIENT_ID}
        NEXT_PUBLIC_VK_REDIRECT_URI: ${VK_REDIRECT_URI}
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:4000
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - l2realm-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./uploads:/var/www/uploads:ro
    depends_on:
      - frontend
    networks:
      - l2realm-net

networks:
  l2realm-net:
    driver_opts:
      com.docker.network.driver.mtu: 1450

volumes:
  postgres_data:
