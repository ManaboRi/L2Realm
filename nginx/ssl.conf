server {
    listen 80;
    server_name l2realm.ru www.l2realm.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.l2realm.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name l2realm.ru;

    ssl_certificate /etc/letsencrypt/live/l2realm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/l2realm.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    return 301 https://www.l2realm.ru$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.l2realm.ru;

    ssl_certificate /etc/letsencrypt/live/l2realm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/l2realm.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
