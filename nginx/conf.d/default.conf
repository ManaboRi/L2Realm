# ═══════════════════════════════════════════════════════════
# L2Realm — nginx config (HTTPS + прямой route для webhook)
# ═══════════════════════════════════════════════════════════

# HTTP → редирект на HTTPS + путь для certbot (Let's Encrypt)
server {
    listen 80;
    server_name l2realm.ru www.l2realm.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — основной сервер
server {
    listen 443 ssl http2;
    server_name l2realm.ru www.l2realm.ru;

    ssl_certificate     /etc/letsencrypt/live/l2realm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/l2realm.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # HSTS дублируем на уровне nginx — браузер запомнит даже если Next.js упал
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Лимит размера тела запроса — защита от простых DoS
    client_max_body_size 2m;

    # ── Webhook ЮКассы — прямо на backend, минуя Next.js ──
    # Чтобы IP-whitelist проверял реальный source IP ЮКассы, а не IP контейнера Next.js.
    # URL для ЮКассы: https://l2realm.ru/yookassa-webhook
    location = /yookassa-webhook {
        proxy_pass http://backend:4000/api/payments/webhook;
        proxy_set_header Host              $host;
        # ВНИМАНИЕ: перезаписываем, а не дополняем — иначе клиент мог бы заспуфить
        # первый элемент списка (откуда backend берёт IP для whitelist).
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Всё остальное → Next.js ──
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        # Перезаписываем X-Forwarded-For (а не $proxy_add_x_forwarded_for):
        # внешний клиент не должен иметь возможность добавить свои значения в начало списка.
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
